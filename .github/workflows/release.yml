name: release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write          # for cosign keyless OIDC
  security-events: write   # for SARIF uploads
  attestations: write      # for GitHub native attestations (build provenance)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-app

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # SAST + SCA — fail-fast static checks before we spend cycles on the build.
  # ─────────────────────────────────────────────────────────────────────────
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: go mod tidy
        working-directory: app
        run: go mod tidy

      - name: go vet
        working-directory: app
        run: go vet ./...

      - name: gosec (SAST)
        uses: securego/gosec@master
        with:
          args: -fmt sarif -out gosec.sarif -no-fail ./app/...

      - name: govulncheck (SCA — Go stdlib + deps)
        working-directory: app
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: trivy fs (SCA — broader scan, fail on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: ./app
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload gosec SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec.sarif
          category: gosec

      - name: go test
        working-directory: app
        run: go test -race -count=1 ./...

  # ─────────────────────────────────────────────────────────────────────────
  # Build, push, SBOM, sign, attest. Only runs on push to main or tag —
  # PRs stop at static-analysis above so contributors can't sign images.
  # ─────────────────────────────────────────────────────────────────────────
  release:
    needs: static-analysis
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push (with provenance)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT=${{ github.sha }}
            TAG=${{ github.ref_name }}
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0.17.0

      - name: Generate SBOM (SPDX JSON)
        run: |
          syft "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}" \
            -o spdx-json=sbom.spdx.json
          syft "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}" \
            -o cyclonedx-json=sbom.cyclonedx.json

      - name: Cosign sign (keyless, OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          for tag in ${{ steps.meta.outputs.tags }}; do
            cosign sign --yes "${tag}@${{ steps.build.outputs.digest }}"
          done

      - name: Cosign attest SBOM
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"

      - name: GitHub native build attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # ─────────────────────────────────────────────────────────────────────────
  # Self-verify — proves the chain works end to end. Pulls what we just
  # pushed and runs the same cosign verify the admission controller would.
  # ─────────────────────────────────────────────────────────────────────────
  verify:
    needs: release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify signature
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          DIGEST="${{ needs.release.outputs.digest }}"
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"

      - name: Verify SBOM attestation
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          DIGEST="${{ needs.release.outputs.digest }}"
          cosign verify-attestation \
            --type spdxjson \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"

      - name: Trivy scan the published image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.release.outputs.digest }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
